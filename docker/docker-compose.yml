services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3100:3100"
    environment:
      - DB_DRIVER=${DB_DRIVER:-sqlite}
      - DATABASE_URL=${DATABASE_URL:-/data/remarq.db}
      - PORT=3100
      - HOST=0.0.0.0
      - BASE_URL=${BASE_URL:-http://localhost:3100}
      - JWT_SECRET=${JWT_SECRET:?Debes definir JWT_SECRET}
      - SALT=${SALT:?Debes definir SALT}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - DEFAULT_MODERATION=${DEFAULT_MODERATION:-pending}
    volumes:
      - remarq_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Solo activar si DB_DRIVER=postgres
  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: remarq
      POSTGRES_USER: remarq
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Necesario con perfil postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  remarq_data:
  postgres_data:
