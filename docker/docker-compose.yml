services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    # Puerto solo expuesto internamente — nginx actúa de reverse proxy.
    # Descomenta la línea siguiente solo para depuración directa:
    # ports:
    #   - "3100:3100"
    environment:
      - DB_DRIVER=${DB_DRIVER:-sqlite}
      - DATABASE_URL=${DATABASE_URL:-/data/bizquss.db}
      - PORT=3100
      - HOST=0.0.0.0
      - BASE_URL=${BASE_URL:-http://localhost}
      - JWT_SECRET=${JWT_SECRET:?Debes definir JWT_SECRET}
      - SALT=${SALT:?Debes definir SALT}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - DEFAULT_MODERATION=${DEFAULT_MODERATION:-pending}
      # URL del admin (a donde redirige el callback de OAuth).
      # En producción: http://TU_IP o https://TU_DOMINIO
      - ADMIN_URL=${ADMIN_URL:-http://localhost}
    volumes:
      - bizquss_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    build:
      context: ..
      dockerfile: docker/nginx.Dockerfile
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # Solo activar si DB_DRIVER=postgres
  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: bizquss
      POSTGRES_USER: bizquss
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Necesario con perfil postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  bizquss_data:
  postgres_data:
